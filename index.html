<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Весёлый парк</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #8fd8ff 0%, #ebfbff 45%, #fff1b8 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      color: #2d2d2d;
      touch-action: manipulation;
    }
    .game {
      width: 100%;
      max-width: 860px;
      background: rgba(255,255,255,0.97);
      border-radius: 28px;
      padding: 14px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.14);
      text-align: center;
      overflow: hidden;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .left-pills, .right-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 22px;
      font-weight: bold;
      background: #fff3b0;
      min-width: 88px;
    }
    .pill.hearts { background: #ffe3e3; }
    .pill.game-name { background: #d0ebff; min-width: 120px; }
    .icon-btn {
      border: none;
      background: #74c0fc;
      color: white;
      font-size: 20px;
      font-weight: bold;
      border-radius: 16px;
      padding: 10px 16px;
      cursor: pointer;
    }
    .start-screen, .scene {
      background: linear-gradient(180deg, #eefcff 0%, #ffffff 100%);
      border-radius: 24px;
      padding: 18px 12px;
    }
    .title {
      font-size: 40px;
      color: #ff6b6b;
      margin: 0 0 8px;
    }
    .big-row {
      font-size: 48px;
      margin: 12px 0 14px;
    }
    .start-btn {
      border: none;
      background: linear-gradient(90deg, #51cf66, #94d82d);
      color: white;
      font-size: 30px;
      font-weight: bold;
      border-radius: 24px;
      padding: 18px 28px;
      min-width: 230px;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(0,0,0,0.14);
    }
    .hint {
      margin-top: 14px;
      font-size: 20px;
      color: #666;
    }
    .stage {
      position: relative;
      background: linear-gradient(180deg, #b2f2ff 0%, #d0f4de 60%, #b7e4a3 100%);
      border-radius: 24px;
      padding: 14px 12px 18px;
      min-height: 420px;
      overflow: hidden;
    }
    .message {
      min-height: 40px;
      font-size: 32px;
      font-weight: bold;
      margin: 4px 0 8px;
    }
    .helper {
      font-size: 34px;
      animation: bounce 1s infinite;
      margin-bottom: 4px;
    }
    .progress-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin: 8px 0 10px;
    }
    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ced4da;
    }
    .dot.done { background: #ffd43b; }
    .animal-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .animal-card {
      width: 180px;
      height: 180px;
      border-radius: 30px;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 10px 24px rgba(0,0,0,0.10);
      display: flex;
      justify-content: center;
      align-items: center;
      border: 6px solid #ffd43b;
    }
    .animal-emoji { font-size: 102px; line-height: 1; }
    .want-bubble {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-width: 88px;
      min-height: 88px;
      background: white;
      border-radius: 999px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
      font-size: 52px;
      border: 4px solid #fab005;
    }
    .foods {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-top: 8px;
    }
    .food {
      border: none;
      border-radius: 24px;
      min-height: 120px;
      background: #fff;
      box-shadow: 0 8px 18px rgba(0,0,0,0.10);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: transform 0.12s ease;
      padding: 8px;
    }
    .food:active { transform: scale(0.97); }
    .food.correct { background: #d3f9d8; }
    .food.wrong { background: #ffe3e3; }
    .food-emoji { font-size: 74px; line-height: 1; user-select: none; pointer-events: none; }
    .play-area {
      position: relative;
      width: 100%;
      height: 280px;
      border-radius: 22px;
      background: linear-gradient(180deg, #c5f6fa 0%, #d8f5a2 100%);
      overflow: hidden;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.5);
    }
    .floating {
      position: absolute;
      width: 78px;
      height: 78px;
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
      font-size: 44px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .burst {
      position: absolute;
      font-size: 38px;
      animation: pop 0.8s ease forwards;
      pointer-events: none;
    }
    .reward-screen { padding-top: 10px; }
    .reward-big { font-size: 82px; margin-bottom: 8px; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes pop {
      0% { transform: translateY(0) scale(0.8); opacity: 0; }
      30% { opacity: 1; }
      100% { transform: translateY(-50px) scale(1.2); opacity: 0; }
    }
    @media (max-width: 640px) {
      .title { font-size: 32px; }
      .big-row { font-size: 40px; }
      .pill { font-size: 19px; }
      .stage { min-height: 430px; }
      .animal-card { width: 150px; height: 150px; }
      .animal-emoji { font-size: 88px; }
      .want-bubble { min-width: 74px; min-height: 74px; font-size: 44px; }
      .food { min-height: 108px; }
      .food-emoji { font-size: 64px; }
      .message { font-size: 28px; }
      .floating { width: 70px; height: 70px; font-size: 40px; }
      .play-area { height: 260px; }
    }
  </style>
</head>
<body>
  <div class="game">
    <div class="topbar">
      <div class="left-pills">
        <div class="pill">⭐ <span id="score">0</span></div>
        <div class="pill hearts">❤️ <span id="lives">3</span></div>
      </div>
      <div class="right-pills">
        <div class="pill game-name" id="gameLabel">🎮</div>
        <button id="restartBtn" class="icon-btn">↻</button>
      </div>
    </div>

    <div id="startScreen" class="start-screen">
      <h1 class="title">Весёлый парк</h1>
      <div class="big-row">🐰 🎈 ⭐ 🐵 🫧 🐻</div>
      <button id="startBtn" class="start-btn">▶ ИГРАТЬ</button>
      <div class="hint">Три игры подряд: корми, лопай, собирай</div>
    </div>

    <div id="playScreen" class="scene" style="display:none;">
      <div class="stage" id="stage">
        <div class="helper">👇</div>
        <div id="message" class="message"></div>
        <div id="progressDots" class="progress-row"></div>
        <div id="gameContent"></div>
      </div>
      <div id="rewardScreen" class="reward-screen" style="display:none;"></div>
    </div>
  </div>

  <script>
    const animals = [
      { emoji: '🐰', food: '🥕' },
      { emoji: '🐵', food: '🍌' },
      { emoji: '🐻', food: '🍯' },
      { emoji: '🐶', food: '🦴' },
      { emoji: '🐱', food: '🐟' },
      { emoji: '🐭', food: '🧀' },
      { emoji: '🐼', food: '🎋' },
      { emoji: '🦊', food: '🍗' }
    ];
    const extraFoods = ['🍎','🍓','🍪','🥒','🍰','🥥','🌽','🥔','🍕','🥨'];
    const balloonsGood = ['🎈','🫧','🎈','🫧','⭐'];
    const balloonsBad = ['💨','☁️'];
    const starsGood = ['⭐','🌟','✨'];
    const starsBad = ['☁️','💨','🍂'];
    const gameFlow = ['feed', 'balloons', 'stars'];

    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const gameLabelEl = document.getElementById('gameLabel');
    const restartBtn = document.getElementById('restartBtn');
    const startBtn = document.getElementById('startBtn');
    const startScreen = document.getElementById('startScreen');
    const playScreen = document.getElementById('playScreen');
    const stageEl = document.getElementById('stage');
    const messageEl = document.getElementById('message');
    const progressDotsEl = document.getElementById('progressDots');
    const gameContentEl = document.getElementById('gameContent');
    const rewardScreenEl = document.getElementById('rewardScreen');

    let score = 0;
    let lives = 3;
    let gameIndex = 0;
    let phaseStep = 0;
    let currentAnimal = null;
    let locked = false;
    let activeTimers = [];
    let activeIntervals = [];

    function shuffle(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function randomItem(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function updateHud() {
      scoreEl.textContent = score;
      livesEl.textContent = lives;
      const labels = { feed: '🍎', balloons: '🎈', stars: '⭐' };
      gameLabelEl.textContent = labels[gameFlow[gameIndex]] || '🎮';
    }

    function setMessage(text, color = '#333') {
      messageEl.textContent = text;
      messageEl.style.color = color;
    }

    function clearAsync() {
      activeTimers.forEach(clearTimeout);
      activeIntervals.forEach(clearInterval);
      activeTimers = [];
      activeIntervals = [];
    }

    function later(fn, ms) {
      const id = setTimeout(fn, ms);
      activeTimers.push(id);
    }

    function every(fn, ms) {
      const id = setInterval(fn, ms);
      activeIntervals.push(id);
    }

    function renderDots(total, done) {
      progressDotsEl.innerHTML = '';
      for (let i = 0; i < total; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i < done ? ' done' : '');
        progressDotsEl.appendChild(dot);
      }
    }

    function burst(emoji, x = 50, y = 45) {
      const el = document.createElement('div');
      el.className = 'burst';
      el.textContent = emoji;
      el.style.left = `${x}%`;
      el.style.top = `${y}%`;
      stageEl.appendChild(el);
      later(() => el.remove(), 800);
    }

    function loseLife() {
      lives -= 1;
      if (lives < 0) lives = 0;
      updateHud();
      burst('💨');
      if (lives <= 0) {
        finishAll(false);
        return true;
      }
      return false;
    }

    function nextGameOrFinish() {
      gameIndex += 1;
      phaseStep = 0;
      if (gameIndex >= gameFlow.length) {
        finishAll(true);
      } else {
        startCurrentGame();
      }
    }

    function startCurrentGame() {
      clearAsync();
      locked = false;
      rewardScreenEl.style.display = 'none';
      rewardScreenEl.innerHTML = '';
      gameContentEl.innerHTML = '';
      updateHud();

      const current = gameFlow[gameIndex];
      if (current === 'feed') startFeedGame();
      if (current === 'balloons') startBalloonGame();
      if (current === 'stars') startStarGame();
    }

    function startFeedGame() {
      renderDots(4, phaseStep);
      setMessage('🍎', '#2f9e44');
      currentAnimal = randomItem(animals);
      const choices = shuffle([currentAnimal.food, ...shuffle(extraFoods).slice(0, 3)]);

      gameContentEl.innerHTML = `
        <div class="animal-wrap">
          <div class="animal-card"><div class="animal-emoji">${currentAnimal.emoji}</div></div>
          <div class="want-bubble">${currentAnimal.food}</div>
        </div>
        <div class="foods" id="foods"></div>
      `;

      const foodsEl = document.getElementById('foods');
      choices.forEach((food) => {
        const btn = document.createElement('button');
        btn.className = 'food';
        btn.innerHTML = `<span class="food-emoji">${food}</span>`;
        btn.addEventListener('click', () => {
          if (locked) return;
          if (food === currentAnimal.food) {
            locked = true;
            score += 2;
            updateHud();
            btn.classList.add('correct');
            burst('⭐');
            phaseStep += 1;
            if (phaseStep >= 4) {
              later(nextGameOrFinish, 700);
            } else {
              later(() => {
                locked = false;
                startFeedGame();
              }, 650);
            }
          } else {
            btn.classList.add('wrong');
            setMessage('🙂', '#e8590c');
            later(() => {
              btn.classList.remove('wrong');
              setMessage('🍎', '#2f9e44');
            }, 350);
            loseLife();
          }
        });
        foodsEl.appendChild(btn);
      });
    }

    function startBalloonGame() {
      renderDots(8, phaseStep);
      setMessage('🎈', '#d6336c');
      gameContentEl.innerHTML = `<div class="play-area" id="playArea"></div>`;
      const area = document.getElementById('playArea');
      let spawned = 0;
      let poppedGood = 0;

      function spawnBalloon() {
        if (spawned >= 8 || lives <= 0 || gameFlow[gameIndex] !== 'balloons') return;
        spawned += 1;
        const good = Math.random() > 0.25;
        const emoji = good ? randomItem(balloonsGood) : randomItem(balloonsBad);
        const btn = document.createElement('button');
        btn.className = 'floating';
        btn.textContent = emoji;
        btn.style.left = `${Math.random() * 78}%`;
        btn.style.top = `${10 + Math.random() * 60}%`;
        area.appendChild(btn);

        btn.addEventListener('click', () => {
          if (!btn.isConnected) return;
          btn.remove();
          if (good) {
            score += 1;
            poppedGood += 1;
            phaseStep = poppedGood;
            updateHud();
            renderDots(8, phaseStep);
            burst('🎉', 50, 55);
            if (poppedGood >= 8) {
              clearAsync();
              later(nextGameOrFinish, 700);
            }
          } else {
            burst('💨', 50, 55);
            loseLife();
          }
        });

        later(() => {
          if (btn.isConnected) btn.remove();
          if (spawned < 8 && gameFlow[gameIndex] === 'balloons') spawnBalloon();
          else if (spawned >= 8 && poppedGood >= 8) later(nextGameOrFinish, 500);
        }, 1400);
      }

      every(spawnBalloon, 800);
      spawnBalloon();
    }

    function startStarGame() {
      renderDots(10, phaseStep);
      setMessage('⭐', '#f59f00');
      gameContentEl.innerHTML = `<div class="play-area" id="playArea"></div>`;
      const area = document.getElementById('playArea');
      let shown = 0;
      let caught = 0;

      function spawnStar() {
        if (shown >= 10 || lives <= 0 || gameFlow[gameIndex] !== 'stars') return;
        shown += 1;
        const good = Math.random() > 0.3;
        const emoji = good ? randomItem(starsGood) : randomItem(starsBad);
        const btn = document.createElement('button');
        btn.className = 'floating';
        btn.textContent = emoji;
        btn.style.left = `${Math.random() * 78}%`;
        btn.style.top = `${8 + Math.random() * 62}%`;
        area.appendChild(btn);

        btn.addEventListener('click', () => {
          if (!btn.isConnected) return;
          btn.remove();
          if (good) {
            score += 1;
            caught += 1;
            phaseStep = caught;
            updateHud();
            renderDots(10, phaseStep);
            burst('⭐', 50, 55);
            if (caught >= 10) {
              clearAsync();
              later(() => finishAll(true), 700);
            }
          } else {
            burst('💨', 50, 55);
            loseLife();
          }
        });

        later(() => {
          if (btn.isConnected) btn.remove();
          if (shown >= 10 && caught >= 10) later(() => finishAll(true), 500);
        }, 1300);
      }

      every(spawnStar, 700);
      spawnStar();
    }

    function finishAll(win) {
      clearAsync();
      locked = true;
      gameContentEl.innerHTML = '';
      renderDots(3, win ? 3 : gameIndex);
      setMessage(win ? '🎉' : '💛', win ? '#2f9e44' : '#e67700');

      const reward = score >= 18 ? '🏆' : score >= 12 ? '🥇' : score >= 8 ? '🥈' : '🥉';
      rewardScreenEl.style.display = 'block';
      rewardScreenEl.innerHTML = `
        <div class="reward-big">${win ? reward : '🙂'}</div>
        <button id="playAgainBtn" class="start-btn">▶ ЕЩЁ</button>
      `;
      document.getElementById('playAgainBtn').addEventListener('click', startGame);

      for (let i = 0; i < Math.min(score, 10); i++) {
        later(() => burst(win ? '⭐' : '💛', 20 + Math.random() * 60, 35 + Math.random() * 20), i * 120);
      }
    }

    function startGame() {
      clearAsync();
      score = 0;
      lives = 3;
      gameIndex = 0;
      phaseStep = 0;
      locked = false;
      startScreen.style.display = 'none';
      playScreen.style.display = 'block';
      updateHud();
      startCurrentGame();
    }

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);
    updateHud();
    renderDots(3, 0);
  </script>
</body>
</html>
