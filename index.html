<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Весёлый парк</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #8fd8ff 0%, #ebfbff 45%, #fff1b8 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      color: #2d2d2d;
      touch-action: manipulation;
    }
    .game {
      width: 100%;
      max-width: 900px;
      background: rgba(255,255,255,0.97);
      border-radius: 28px;
      padding: 14px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.14);
      text-align: center;
      overflow: hidden;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .left-pills, .right-pills, .theme-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }
    .theme-row { margin-top: 14px; }
    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 22px;
      font-weight: bold;
      background: #fff3b0;
      min-width: 88px;
    }
    .pill.hearts { background: #ffe3e3; }
    .pill.game-name { background: #d0ebff; min-width: 120px; }
    .icon-btn, .theme-btn, .sound-btn {
      border: none;
      background: #74c0fc;
      color: white;
      font-size: 20px;
      font-weight: bold;
      border-radius: 16px;
      padding: 10px 16px;
      cursor: pointer;
    }
    .theme-btn.active, .sound-btn.active { background: #51cf66; }
    .start-screen, .scene {
      background: linear-gradient(180deg, #eefcff 0%, #ffffff 100%);
      border-radius: 24px;
      padding: 18px 12px;
    }
    .title {
      font-size: 40px;
      color: #ff6b6b;
      margin: 0 0 8px;
    }
    .big-row {
      font-size: 48px;
      margin: 12px 0 14px;
      min-height: 58px;
    }
    .start-btn {
      border: none;
      background: linear-gradient(90deg, #51cf66, #94d82d);
      color: white;
      font-size: 30px;
      font-weight: bold;
      border-radius: 24px;
      padding: 18px 28px;
      min-width: 230px;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(0,0,0,0.14);
    }
    .hint {
      margin-top: 14px;
      font-size: 20px;
      color: #666;
    }
    .stage {
      position: relative;
      background: linear-gradient(180deg, #b2f2ff 0%, #d0f4de 60%, #b7e4a3 100%);
      border-radius: 24px;
      padding: 14px 12px 18px;
      min-height: 430px;
      overflow: hidden;
    }
    .message {
      min-height: 40px;
      font-size: 32px;
      font-weight: bold;
      margin: 4px 0 8px;
    }
    .helper {
      font-size: 34px;
      animation: bounce 1s infinite;
      margin-bottom: 4px;
    }
    .progress-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin: 8px 0 10px;
    }
    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ced4da;
    }
    .dot.done { background: #ffd43b; }
    .animal-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .animal-card {
      width: 180px;
      height: 180px;
      border-radius: 30px;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 10px 24px rgba(0,0,0,0.10);
      display: flex;
      justify-content: center;
      align-items: center;
      border: 6px solid #ffd43b;
    }
    .animal-emoji { font-size: 102px; line-height: 1; }
    .want-bubble {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-width: 88px;
      min-height: 88px;
      background: white;
      border-radius: 999px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
      font-size: 52px;
      border: 4px solid #fab005;
    }
    .foods {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-top: 8px;
    }
    .food {
      border: none;
      border-radius: 24px;
      min-height: 120px;
      background: #fff;
      box-shadow: 0 8px 18px rgba(0,0,0,0.10);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: transform 0.12s ease;
      padding: 8px;
    }
    .food:active { transform: scale(0.97); }
    .food.correct { background: #d3f9d8; }
    .food.wrong { background: #ffe3e3; }
    .food-emoji { font-size: 74px; line-height: 1; user-select: none; pointer-events: none; }
    .play-area {
      position: relative;
      width: 100%;
      height: 290px;
      border-radius: 22px;
      background: linear-gradient(180deg, #c5f6fa 0%, #d8f5a2 100%);
      overflow: hidden;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.5);
    }
    .floating {
      position: absolute;
      width: 78px;
      height: 78px;
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
      font-size: 44px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      user-select: none;
      transition: transform 0.08s linear;
    }
    .burst {
      position: absolute;
      font-size: 38px;
      animation: pop 0.8s ease forwards;
      pointer-events: none;
    }
    .reward-screen { padding-top: 10px; }
    .reward-big { font-size: 82px; margin-bottom: 8px; }
    .unlock-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 10px 0 14px;
      font-size: 34px;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes pop {
      0% { transform: translateY(0) scale(0.8); opacity: 0; }
      30% { opacity: 1; }
      100% { transform: translateY(-50px) scale(1.2); opacity: 0; }
    }
    @media (max-width: 640px) {
      .title { font-size: 32px; }
      .big-row { font-size: 40px; }
      .pill, .theme-btn, .sound-btn { font-size: 18px; }
      .stage { min-height: 440px; }
      .animal-card { width: 150px; height: 150px; }
      .animal-emoji { font-size: 88px; }
      .want-bubble { min-width: 74px; min-height: 74px; font-size: 44px; }
      .food { min-height: 108px; }
      .food-emoji { font-size: 64px; }
      .message { font-size: 28px; }
      .floating { width: 70px; height: 70px; font-size: 40px; }
      .play-area { height: 270px; }
    }
  </style>
</head>
<body>
  <div class="game">
    <div class="topbar">
      <div class="left-pills">
        <div class="pill">⭐ <span id="score">0</span></div>
        <div class="pill hearts">❤️ <span id="lives">3</span></div>
      </div>
      <div class="right-pills">
        <button id="soundBtn" class="sound-btn active">🔊</button>
        <div class="pill game-name" id="gameLabel">🎮</div>
        <button id="restartBtn" class="icon-btn">↻</button>
      </div>
    </div>

    <div id="startScreen" class="start-screen">
      <h1 class="title">Весёлый парк</h1>
      <div class="big-row" id="themePreview">🐰 🎈 ⭐ 🐵 🫧 🐻</div>
      <button id="startBtn" class="start-btn">▶ ИГРАТЬ</button>
      <div class="hint">Три игры подряд: корми, лопай, собирай</div>
      <div class="theme-row" id="themeRow"></div>
    </div>

    <div id="playScreen" class="scene" style="display:none;">
      <div class="stage" id="stage">
        <div class="helper">👇</div>
        <div id="message" class="message"></div>
        <div id="progressDots" class="progress-row"></div>
        <div id="gameContent"></div>
      </div>
      <div id="rewardScreen" class="reward-screen" style="display:none;"></div>
    </div>
  </div>

  <script>
    const themes = {
      animals: {
        label: '🐰',
        preview: '🐰 🎈 ⭐ 🐵 🫧 🐻',
        feedPairs: [
          { hero: '🐰', target: '🥕' },
          { hero: '🐵', target: '🍌' },
          { hero: '🐻', target: '🍯' },
          { hero: '🐶', target: '🦴' },
          { hero: '🐱', target: '🐟' },
          { hero: '🐭', target: '🧀' },
          { hero: '🐼', target: '🎋' },
          { hero: '🦊', target: '🍗' }
        ],
        distractors: ['🍎','🍓','🍪','🥒','🍰','🥥','🌽','🥔','🍕','🥨'],
        popGood: ['🎈','🫧','🎈','🫧','⭐'],
        popBad: ['💨','☁️'],
        collectGood: ['⭐','🌟','✨'],
        collectBad: ['☁️','💨','🍂'],
        unlocks: ['🦁','🐯','🦄']
      },
      cars: {
        label: '🚗',
        preview: '🚗 🛞 ⭐ 🚙 ⛽ 🏎️',
        feedPairs: [
          { hero: '🚗', target: '⛽' },
          { hero: '🚙', target: '🛞' },
          { hero: '🏎️', target: '🏁' },
          { hero: '🚕', target: '🔧' },
          { hero: '🚓', target: '🪫' },
          { hero: '🚑', target: '🧰' }
        ],
        distractors: ['🍎','🌂','🎁','🪥','🎲','🧁','🧸','📦'],
        popGood: ['🚗','🛞','⭐','🏎️'],
        popBad: ['💨','☁️'],
        collectGood: ['⭐','🏁','✨'],
        collectBad: ['☁️','🪨','💨'],
        unlocks: ['🚜','🚒','🛻']
      },
      dino: {
        label: '🦖',
        preview: '🦖 🥚 ⭐ 🦕 🌋 🍃',
        feedPairs: [
          { hero: '🦖', target: '🍖' },
          { hero: '🦕', target: '🍃' },
          { hero: '🐣', target: '🥚' },
          { hero: '🦴', target: '🪨' }
        ],
        distractors: ['🍰','🌽','🍎','🧁','🎈','🥥','🍕','🎲'],
        popGood: ['🫧','🥚','⭐','🌋'],
        popBad: ['☄️','💨'],
        collectGood: ['⭐','✨','🦴'],
        collectBad: ['☁️','💨','🌪️'],
        unlocks: ['🐉','🦖','🌟']
      },
      princess: {
        label: '👑',
        preview: '👑 🎀 ⭐ 🪄 💎 🏰',
        feedPairs: [
          { hero: '👸', target: '👑' },
          { hero: '🦄', target: '🌈' },
          { hero: '🧚', target: '🪄' },
          { hero: '🐸', target: '💋' }
        ],
        distractors: ['🍎','🥒','🎲','🧸','🥥','📦','🪥','🍪'],
        popGood: ['🎈','💎','⭐','🫧'],
        popBad: ['☁️','💨'],
        collectGood: ['⭐','✨','💖'],
        collectBad: ['☁️','💨','🍂'],
        unlocks: ['🏰','💎','🪄']
      }
    };

    const gameFlow = ['feed', 'balloons', 'stars'];

    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const gameLabelEl = document.getElementById('gameLabel');
    const restartBtn = document.getElementById('restartBtn');
    const startBtn = document.getElementById('startBtn');
    const soundBtn = document.getElementById('soundBtn');
    const startScreen = document.getElementById('startScreen');
    const playScreen = document.getElementById('playScreen');
    const stageEl = document.getElementById('stage');
    const messageEl = document.getElementById('message');
    const progressDotsEl = document.getElementById('progressDots');
    const gameContentEl = document.getElementById('gameContent');
    const rewardScreenEl = document.getElementById('rewardScreen');
    const themeRowEl = document.getElementById('themeRow');
    const themePreviewEl = document.getElementById('themePreview');

    let score = 0;
    let lives = 3;
    let gameIndex = 0;
    let phaseStep = 0;
    let currentPair = null;
    let locked = false;
    let activeTimers = [];
    let isRunning = false;
    let soundOn = true;
    let currentTheme = 'animals';
    let unlocked = JSON.parse(localStorage.getItem('kid_game_unlocks') || '[]');

    function currentThemeData() {
      return themes[currentTheme];
    }

    function saveUnlocks() {
      localStorage.setItem('kid_game_unlocks', JSON.stringify(unlocked));
    }

    function shuffle(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function randomItem(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function updateHud() {
      scoreEl.textContent = score;
      livesEl.textContent = lives;
      const labels = { feed: '🍎', balloons: '🎈', stars: '⭐' };
      gameLabelEl.textContent = labels[gameFlow[gameIndex]] || themes[currentTheme].label;
      soundBtn.classList.toggle('active', soundOn);
      soundBtn.textContent = soundOn ? '🔊' : '🔈';
    }

    function setMessage(text, color = '#333') {
      messageEl.textContent = text;
      messageEl.style.color = color;
    }

    function clearTimers() {
      activeTimers.forEach(clearTimeout);
      activeTimers = [];
    }

    function later(fn, ms) {
      const id = setTimeout(fn, ms);
      activeTimers.push(id);
      return id;
    }

    function renderDots(total, done) {
      progressDotsEl.innerHTML = '';
      for (let i = 0; i < total; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i < done ? ' done' : '');
        progressDotsEl.appendChild(dot);
      }
    }

    function burst(emoji, x = 50, y = 45) {
      const el = document.createElement('div');
      el.className = 'burst';
      el.textContent = emoji;
      el.style.left = `${x}%`;
      el.style.top = `${y}%`;
      stageEl.appendChild(el);
      later(() => el.remove(), 800);
    }

    function beep(freq, duration, type = 'sine', volume = 0.03) {
      if (!soundOn) return;
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;
      if (!window.__kidAudio) window.__kidAudio = new AudioCtx();
      const ctx = window.__kidAudio;
      if (ctx.state === 'suspended') ctx.resume();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = volume;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + duration / 1000);
    }

    function playGood() {
      beep(660, 90); later(() => beep(880, 120), 80);
    }

    function playBad() {
      beep(220, 140, 'square', 0.025);
    }

    function renderThemes() {
      themeRowEl.innerHTML = '';
      Object.entries(themes).forEach(([key, data]) => {
        const btn = document.createElement('button');
        btn.className = 'theme-btn' + (key === currentTheme ? ' active' : '');
        btn.textContent = data.label;
        btn.addEventListener('click', () => {
          currentTheme = key;
          themePreviewEl.textContent = data.preview;
          renderThemes();
          updateHud();
        });
        themeRowEl.appendChild(btn);
      });
      themePreviewEl.textContent = themes[currentTheme].preview;
    }

    function loseLife() {
      if (!isRunning) return true;
      lives -= 1;
      if (lives < 0) lives = 0;
      updateHud();
      playBad();
      burst('💨');
      if (lives <= 0) {
        finishAll(false);
        return true;
      }
      return false;
    }

    function nextGameOrFinish() {
      if (!isRunning) return;
      gameIndex += 1;
      phaseStep = 0;
      if (gameIndex >= gameFlow.length) {
        finishAll(true);
      } else {
        startCurrentGame();
      }
    }

    function startCurrentGame() {
      if (!isRunning) return;
      clearTimers();
      locked = false;
      rewardScreenEl.style.display = 'none';
      rewardScreenEl.innerHTML = '';
      gameContentEl.innerHTML = '';
      updateHud();

      const current = gameFlow[gameIndex];
      if (current === 'feed') startFeedGame();
      if (current === 'balloons') startBalloonGame();
      if (current === 'stars') startStarGame();
    }

    function startFeedGame() {
      renderDots(4, phaseStep);
      setMessage('🍎', '#2f9e44');
      const data = currentThemeData();
      currentPair = randomItem(data.feedPairs);
      const choices = shuffle([currentPair.target, ...shuffle(data.distractors).slice(0, 3)]);

      gameContentEl.innerHTML = `
        <div class="animal-wrap">
          <div class="animal-card"><div class="animal-emoji">${currentPair.hero}</div></div>
          <div class="want-bubble">${currentPair.target}</div>
        </div>
        <div class="foods" id="foods"></div>
      `;

      const foodsEl = document.getElementById('foods');
      choices.forEach((item) => {
        const btn = document.createElement('button');
        btn.className = 'food';
        btn.innerHTML = `<span class="food-emoji">${item}</span>`;
        btn.addEventListener('click', () => {
          if (!isRunning || locked) return;
          if (item === currentPair.target) {
            locked = true;
            score += 2;
            updateHud();
            btn.classList.add('correct');
            playGood();
            burst('⭐');
            phaseStep += 1;
            if (phaseStep >= 4) {
              later(nextGameOrFinish, 700);
            } else {
              later(() => {
                locked = false;
                startFeedGame();
              }, 650);
            }
          } else {
            btn.classList.add('wrong');
            setMessage('🙂', '#e8590c');
            later(() => {
              btn.classList.remove('wrong');
              if (isRunning) setMessage('🍎', '#2f9e44');
            }, 350);
            loseLife();
          }
        });
        foodsEl.appendChild(btn);
      });
    }

    function animateFloating(button, config) {
      const area = button.parentElement;
      let x = config.x;
      let y = config.y;
      let vx = config.vx;
      let vy = config.vy;
      let alive = true;

      function step() {
        if (!isRunning || !alive || !button.isConnected || !area) return;
        const maxX = Math.max(0, area.clientWidth - button.offsetWidth);
        const maxY = Math.max(0, area.clientHeight - button.offsetHeight);
        x += vx;
        y += vy;
        if (x <= 0 || x >= maxX) vx *= -1;
        if (y <= 0 || y >= maxY) vy *= -1;
        x = Math.max(0, Math.min(maxX, x));
        y = Math.max(0, Math.min(maxY, y));
        button.style.left = `${x}px`;
        button.style.top = `${y}px`;
        const id = requestAnimationFrame(step);
        button.__raf = id;
      }

      button.__stopMotion = () => {
        alive = false;
        if (button.__raf) cancelAnimationFrame(button.__raf);
      };

      step();
    }

    function spawnMovingItem(area, emoji, good, onResolved) {
      const btn = document.createElement('button');
      btn.className = 'floating';
      btn.textContent = emoji;
      btn.style.left = '0px';
      btn.style.top = '0px';
      area.appendChild(btn);

      animateFloating(btn, {
        x: Math.random() * Math.max(20, area.clientWidth - 90),
        y: Math.random() * Math.max(20, area.clientHeight - 90),
        vx: (Math.random() * 1.8 + 0.8) * (Math.random() > 0.5 ? 1 : -1),
        vy: (Math.random() * 1.6 + 0.7) * (Math.random() > 0.5 ? 1 : -1)
      });

      let resolved = false;
      function resolve(result) {
        if (resolved) return;
        resolved = true;
        if (btn.__stopMotion) btn.__stopMotion();
        if (btn.isConnected) btn.remove();
        onResolved(result);
      }

      btn.addEventListener('click', () => resolve(good ? 'good' : 'bad'));
      later(() => resolve('miss'), 2200);
    }

    function startBalloonGame() {
      renderDots(8, phaseStep);
      setMessage('🎈', '#d6336c');
      gameContentEl.innerHTML = `<div class="play-area" id="playArea"></div>`;
      const area = document.getElementById('playArea');
      let spawned = 0;
      let resolvedCount = 0;
      let goodHits = 0;

      function maybeContinue() {
        if (!isRunning) return;
        if (goodHits >= 8) {
          later(nextGameOrFinish, 600);
          return;
        }
        if (resolvedCount >= 10) {
          later(nextGameOrFinish, 600);
          return;
        }
        spawnNext();
      }

      function spawnNext() {
        if (!isRunning || gameFlow[gameIndex] !== 'balloons') return;
        if (spawned >= 10) return;
        spawned += 1;
        const good = Math.random() > 0.25;
        const emoji = good ? randomItem(currentThemeData().popGood) : randomItem(currentThemeData().popBad);
        spawnMovingItem(area, emoji, good, (result) => {
          if (!isRunning) return;
          resolvedCount += 1;
          if (result === 'good') {
            score += 1;
            goodHits += 1;
            phaseStep = goodHits;
            updateHud();
            renderDots(8, phaseStep);
            playGood();
            burst('🎉', 50, 55);
          } else if (result === 'bad') {
            loseLife();
          }
          maybeContinue();
        });
      }

      spawnNext();
    }

    function startStarGame() {
      renderDots(10, phaseStep);
      setMessage('⭐', '#f59f00');
      gameContentEl.innerHTML = `<div class="play-area" id="playArea"></div>`;
      const area = document.getElementById('playArea');
      let spawned = 0;
      let resolvedCount = 0;
      let goodHits = 0;

      function maybeContinue() {
        if (!isRunning) return;
        if (goodHits >= 10) {
          later(() => finishAll(true), 650);
          return;
        }
        if (resolvedCount >= 12) {
          later(() => finishAll(true), 650);
          return;
        }
        spawnNext();
      }

      function spawnNext() {
        if (!isRunning || gameFlow[gameIndex] !== 'stars') return;
        if (spawned >= 12) return;
        spawned += 1;
        const good = Math.random() > 0.3;
        const emoji = good ? randomItem(currentThemeData().collectGood) : randomItem(currentThemeData().collectBad);
        spawnMovingItem(area, emoji, good, (result) => {
          if (!isRunning) return;
          resolvedCount += 1;
          if (result === 'good') {
            score += 1;
            goodHits += 1;
            phaseStep = goodHits;
            updateHud();
            renderDots(10, phaseStep);
            playGood();
            burst('⭐', 50, 55);
          } else if (result === 'bad') {
            loseLife();
          }
          maybeContinue();
        });
      }

      spawnNext();
    }

    function applyUnlocks() {
      const toUnlock = currentThemeData().unlocks.filter((item) => !unlocked.includes(item));
      if (score >= 10 && toUnlock.length) {
        unlocked.push(toUnlock[0]);
        saveUnlocks();
        return [toUnlock[0]];
      }
      return [];
    }

    function finishAll(win) {
      clearTimers();
      isRunning = false;
      locked = true;
      gameContentEl.innerHTML = '';
      renderDots(3, win ? 3 : gameIndex);
      setMessage(win ? '🎉' : '💛', win ? '#2f9e44' : '#e67700');

      const reward = score >= 18 ? '🏆' : score >= 12 ? '🥇' : score >= 8 ? '🥈' : '🥉';
      const newUnlocks = win ? applyUnlocks() : [];
      rewardScreenEl.style.display = 'block';
      rewardScreenEl.innerHTML = `
        <div class="reward-big">${win ? reward : '🙂'}</div>
        <div class="unlock-row">${newUnlocks.concat(unlocked.slice(-3)).map(x => `<span>${x}</span>`).join('')}</div>
        <button id="playAgainBtn" class="start-btn">▶ ЕЩЁ</button>
      `;
      document.getElementById('playAgainBtn').addEventListener('click', startGame);

      for (let i = 0; i < Math.min(score, 10); i++) {
        later(() => burst(win ? '⭐' : '💛', 20 + Math.random() * 60, 35 + Math.random() * 20), i * 120);
      }
    }

    function startGame() {
      clearTimers();
      score = 0;
      lives = 3;
      gameIndex = 0;
      phaseStep = 0;
      currentPair = null;
      locked = false;
      isRunning = true;
      startScreen.style.display = 'none';
      playScreen.style.display = 'block';
      updateHud();
      startCurrentGame();
    }

    soundBtn.addEventListener('click', () => {
      soundOn = !soundOn;
      updateHud();
    });
    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);

    renderThemes();
    updateHud();
    renderDots(3, 0);
  </script>
</body>
</html>
